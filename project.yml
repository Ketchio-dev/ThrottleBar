name: ThrottleBar
options:
  bundleIdPrefix: io.github.opensource
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGNING_ALLOWED: NO
targets:
  ThrottleBar:
    type: application
    platform: macOS
    sources:
      - path: ThrottleBar
        excludes:
          - Resources/Info.plist
    resources:
      - path: ThrottleBar/Resources
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.opensource.ThrottleBar
        PRODUCT_NAME: ThrottleBar
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ThrottleBar/Resources/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
    scheme:
      testTargets:
        - ThrottleBarTests
  ThrottleBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ThrottleBarTests
    dependencies:
      - target: ThrottleBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.opensource.ThrottleBarTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic

