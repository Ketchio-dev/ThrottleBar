name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Build and test
        run: xcodebuild -scheme ThrottleBar -destination 'platform=macOS' CODE_SIGNING_ALLOWED=NO test

